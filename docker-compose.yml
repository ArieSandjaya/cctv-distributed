services:
  # ── Message Broker ────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: cctv-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt-data:/mosquitto/data
    restart: unless-stopped

  # ── Central Server (The Brain) ────────────────────────────────
  central:
    build: ./central-server
    container_name: cctv-central
    ports:
      - "8000:8000"
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - DB_PATH=/data/central.db
    volumes:
      - central-data:/data
    depends_on:
      - mosquitto
    restart: unless-stopped

  # ── Edge Workers (The Muscles) ─────────────────────────────────
  # Uncomment & replicate for each camera group
  # edge-cam01:
  #   build: ./edge-worker
  #   container_name: cctv-edge-cam01
  #   environment:
  #     - CAM_ID=cam_01
  #     - CAM_URL=rtsp://192.168.1.100:554/stream1
  #     - MQTT_BROKER=mosquitto
  #     - MQTT_PORT=1883
  #     - FACE_ENABLED=true
  #   volumes:
  #     - ./edge-worker/known_faces:/app/known_faces
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]
  #   depends_on:
  #     - mosquitto
  #   restart: unless-stopped

volumes:
  mqtt-data:
  central-data:
